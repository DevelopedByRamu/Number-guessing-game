<!doctype html>
<html lang="en">
  <head>
    <title>Number Guess Game | JavaScript</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="wrapper">
      <header>Guess a number from 1 to 50</header>
      <p class="guess"></p>
      <div class="input-field">
        <input type="number" />
        <button>Check</button>
      </div>
      <p>You have <span class="chances">5</span> chances</p>
    </div>

    <!-- load simple confetti helper -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.4.0/dist/confetti.browser.min.js"></script>
    <script src="./script.js" defer></script>
  </body>
</html>
